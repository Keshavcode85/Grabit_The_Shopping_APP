<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Checkout — Grabit</title>
  <link rel="icon" type="image/x-icon" href="shop.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="brand" onclick="window.location.href='index.html'">Grab<span>it</span></div>
  <div class="cart-icon" onclick="goToCart()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    Cart <div class="cart-badge" id="cart-count">0</div>
  </div>
</nav>

<div class="checkout-layout">
  <!-- FORM -->
  <div class="checkout-form-side">
    <h2>Delivery Details</h2>

    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="name" placeholder="e.g. Rahul Sharma" autocomplete="name">
    </div>
    <div class="form-group">
      <label>Phone Number</label>
      <input type="tel" id="phone" placeholder="10-digit mobile number" autocomplete="tel">
    </div>
    <div class="form-group">
      <label>Street Address</label>
      <input type="text" id="address" placeholder="House/Flat no., Street, Area" autocomplete="street-address">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>City</label>
        <input type="text" id="city" placeholder="Mumbai" autocomplete="address-level2">
      </div>
      <div class="form-group">
        <label>Pincode</label>
        <input type="text" id="pincode" placeholder="400001" maxlength="6">
      </div>
    </div>

    <div style="height:24px;"></div>

    <div id="form-error" style="color:var(--red);font-size:0.85rem;margin-bottom:16px;display:none;"></div>

    <button class="btn-primary" style="width:100%;padding:16px;font-size:0.95rem;" onclick="validateOrder()">
      Place Order →
    </button>
    <button class="btn-back" style="width:100%;margin-top:10px;padding:13px;" onclick="window.history.back()">← Back to Cart</button>
  </div>

  <!-- SUMMARY -->
  <div class="checkout-sidebar">
    <h3>Order Summary</h3>
    <div id="order-items"></div>
    <div class="summary-line" style="margin-top:8px;"><span>Subtotal</span><span>₹<span id="subtotal">0</span></span></div>
    <div class="summary-line"><span>Delivery</span><span style="color:var(--green)">Free</span></div>
    <div class="summary-line total"><span>Total</span><span class="price">₹<span id="total">0</span></span></div>
  </div>
</div>

<script src="script.js"></script>
<script>
  function loadSummary() {
    const cart = getCart();
    const container = document.getElementById("order-items");
    let total = 0;
    container.innerHTML = "";

    cart.forEach(item => {
      const inr = Math.round(item.price * 83) * (item.qty || 1);
      total += inr;
      const row = document.createElement("div");
      row.className = "order-item-row";
      row.innerHTML = `
        <img src="${item.image}" alt="${item.title}">
        <div class="order-item-name">${item.title} × ${item.qty || 1}</div>
        <div class="order-item-price">₹${inr.toLocaleString("en-IN")}</div>
      `;
      container.appendChild(row);
    });

    document.getElementById("subtotal").textContent = total.toLocaleString("en-IN");
    document.getElementById("total").textContent = total.toLocaleString("en-IN");
  }

  function validateOrder() {
    const name = document.getElementById("name").value.trim();
    const phone = document.getElementById("phone").value.trim();
    const address = document.getElementById("address").value.trim();
    const city = document.getElementById("city").value.trim();
    const pincode = document.getElementById("pincode").value.trim();
    const cart = getCart();
    const err = document.getElementById("form-error");

    err.style.display = "none";

    if (!cart.length) { showErr("Your cart is empty!"); return; }
    if (!name) { showErr("Please enter your full name."); return; }
    if (!/^\d{10}$/.test(phone)) { showErr("Please enter a valid 10-digit phone number."); return; }
    if (!address) { showErr("Please enter your street address."); return; }
    if (!city) { showErr("Please enter your city."); return; }
    if (!/^\d{6}$/.test(pincode)) { showErr("Please enter a valid 6-digit pincode."); return; }

    placeOrder();
  }

  function showErr(msg) {
    const err = document.getElementById("form-error");
    err.textContent = "⚠ " + msg;
    err.style.display = "block";
  }

  loadSummary();
</script>
</body>
</html>
