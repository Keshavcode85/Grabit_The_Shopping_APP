<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Grabit — Shop Everything</title>
  <link rel="icon" type="image/x-icon" href="shop.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="brand" onclick="window.location.href='index.html'">Grab<span>it</span></div>
  <div class="search-wrap">
    <span class="search-icon">⌕</span>
    <input type="text" placeholder="Search products, brands…" oninput="searchProduct(this.value)">
  </div>
  <div class="cart-icon" onclick="goToCart()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
      <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>
    </svg>
    Cart
    <div class="cart-badge" id="cart-count">0</div>
  </div>
</nav>

<div class="page-header">
  <h1>Curated <em>Collections</em></h1>
  <p>Discover premium products across every category</p>
</div>

<div class="category-bar">
  <button class="cat-pill active" data-cat="all" onclick="filterByCategory('all')">All</button>
  <button class="cat-pill" data-cat="electronics" onclick="filterByCategory('electronics')">Electronics</button>
  <button class="cat-pill" data-cat="jewelery" onclick="filterByCategory('jewelery')">Jewellery</button>
  <button class="cat-pill" data-cat="mens-clothing" onclick="filterByCategory('mens-clothing')">Men</button>
  <button class="cat-pill" data-cat="womens-clothing" onclick="filterByCategory('womens-clothing')">Women</button>
</div>

<p id="loading" style="text-align:center;padding:80px 0;color:#555;letter-spacing:2px;text-transform:uppercase;font-size:0.8rem;">Loading products<span class="loader-dots"></span></p>

<div id="product-container" class="product-container"></div>

<div class="toast" id="toast"></div>

<script src="script.js"></script>
<script>
  function renderProducts(products) {
    const container = document.getElementById("product-container");
    const loadEl = document.getElementById("loading");
    if (loadEl) loadEl.style.display = "none";
    container.innerHTML = "";

    if (!products.length) {
      container.innerHTML = `<p style="grid-column:1/-1;text-align:center;color:var(--muted);padding:80px 0;">No products found.</p>`;
      return;
    }

    const badges = {
      "electronics": "🔥 Hot",
      "jewelery": "✨ Trending",
      "men's clothing": "👕 Popular",
      "women's clothing": "💫 New"
    };

    products.forEach((p, i) => {
      const inr = Math.round(p.price * 83);
      const rate = p.rating?.rate || 4;
      const filled = Math.round(rate);
      const stars = "★".repeat(filled) + "☆".repeat(5 - filled);
      const badge = badges[p.category] || "";

      const card = document.createElement("div");
      card.className = "product-card";
      card.style.animationDelay = `${i * 0.04}s`;
      card.innerHTML = `
        <div class="card-img-wrap" onclick="viewProduct(${p.id})">
          <img src="${p.image}" alt="${p.title}" loading="lazy">
          ${badge ? `<div class="card-badge">${badge}</div>` : ""}
        </div>
        <div class="card-body">
          <div class="card-category">${p.category}</div>
          <div class="card-title" onclick="viewProduct(${p.id})">${p.title}</div>
          <div class="card-rating">
            <span class="stars">${stars}</span>
            <span>${rate} &nbsp;(${p.rating?.count})</span>
          </div>
          <div class="card-price-row">
            <div class="card-price">₹${inr.toLocaleString("en-IN")}</div>
            <div class="card-price-usd">~ $${p.price}</div>
          </div>
          <div class="card-actions">
            <button class="btn-view" onclick="viewProduct(${p.id})">View</button>
            <button class="btn-add" onclick="addToCart(${p.id}); showToast('Added to cart! 🛒')">+ Add</button>
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function showToast(msg, type) {
    const t = document.getElementById("toast");
    t.textContent = msg;
    t.className = "toast" + (type ? " " + type : "");
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2200);
  }

  initIndex();
</script>
</body>
</html>
